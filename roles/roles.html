<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roles</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main class="main-panel">
    <section class="panel-card panel-card--active">
      <div class="panel-card__header">
        <div>
          <p class="panel-card__eyebrow">Standalone page</p>
          <h3>Roles</h3>
        </div>
        <a class="panel-link" href="../index.html">Powrót do panelu</a>
      </div>
      <div class="role-grid">
        <article class="role-tile role-tile--violet"><span class="role-chip">Administracja</span><p>Główne decyzje i zarządzanie serwerem.</p></article>
        <article class="role-tile role-tile--orange"><span class="role-chip">Pomocnicy Moderacji</span><p>Wsparcie moderacyjne i pomoc użytkownikom.</p></article>
        <article class="role-tile role-tile--green"><span class="role-chip">Członkowie</span><p>Aktywna część społeczności.</p></article>
        <article class="role-tile role-tile--gray"><span class="role-chip">Gość</span><p>Nowi użytkownicy i odwiedzający.</p></article>
        <article class="role-tile role-tile--gold"><span class="role-chip">Bogowie serwera</span><p>Rola symboliczna dla wyróżnionych osób.</p></article>
      </div>
    </section>
  </main>
</body>
</html>
