<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channels</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main class="main-panel">
    <section class="panel-card panel-card--active">
      <div class="panel-card__header">
        <div>
          <p class="panel-card__eyebrow">Standalone page</p>
          <h3>Channels</h3>
        </div>
        <a class="panel-link" href="../index.html">Powrót do panelu</a>
      </div>
      <div class="channel-layout">
        <article class="info-box">
          <h4>Tekstowe</h4>
          <ul class="channel-list">
            <li><span>#</span> ogłoszenia</li>
            <li><span>#</span> chat-ogólny</li>
            <li><span>#</span> pomoc</li>
          </ul>
        </article>
        <article class="info-box">
          <h4>Głosowe</h4>
          <ul class="channel-list channel-list--voice">
            <li><span>•</span> Poczekalnia</li>
            <li><span>•</span> Event Room</li>
          </ul>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
